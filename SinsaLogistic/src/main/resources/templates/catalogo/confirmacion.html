<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cotización Enviada</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Sinsa Logistics</span>
    <div>
        <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card text-center shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body py-5">

            <div class="mb-3">
                <span style="font-size: 64px;">✅</span>
            </div>

            <h4 class="card-title mb-2">¡Cotización enviada!</h4>
            <p class="text-muted mb-4">
                Tu cotización fue registrada correctamente con estado <strong>PENDIENTE</strong>. 
                Un asesor se pondrá en contacto contigo pronto.
            </p>

            <div class="d-flex justify-content-center gap-3">
                <a href="/catalogo/materiales" class="btn btn-outline-primary">
                    Ver catálogo
                </a>
                <a href="/catalogo/cotizar" class="btn btn-primary">
                    Nueva cotización
                </a>
