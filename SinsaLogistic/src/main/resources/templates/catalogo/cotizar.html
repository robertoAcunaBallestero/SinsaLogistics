<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nueva Cotización</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Sinsa Logistics</span>
    <div>
        <a href="/catalogo/materiales" class="btn btn-outline-light btn-sm me-2">Ver Catálogo</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
    </div>
</nav>
<div class="container mt-4">
    <h4 class="mb-1">Nueva Cotización</h4>
    <p class="text-muted mb-3">
        Cliente: <strong th:text="${cliente.nombre}"></strong>
    </p>

    <!-- Mensaje de error si existe -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/catalogo/guardar}" method="post">

        <!-- Datos de entrega -->
        <div class="card mb-4">
            <div class="card-header">Datos de entrega</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Teléfono de contacto</label>
                        <input type="tel" name="telefono" class="form-control"
                               placeholder="Ej: 8888-8888" required/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Dirección de entrega</label>
                        <input type="text" name="direccionEntrega" class="form-control"
                               placeholder="Ej: San José, Av. Central" required/>
                    </div>
                </div>
            </div>
        </div>

        <!-- Materiales -->
        <div class="card mb-4">
            <div class="card-header">Selecciona los materiales y cantidades</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Material</th>
                            <th>Descripción</th>
                            <th>Precio unitario</th>
                            <th>Stock disponible</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="material : ${materiales}">
                            <td th:text="${material.nombre}"></td>
                            <td th:text="${material.descripcion}"></td>
                            <td>₡<span th:text="${material.precio}"></span></td>
                            <td>
                                <span th:text="${material.stock}"
                                      th:classappend="${material.stock == 0} ? 'text-danger fw-bold' : 'text-success fw-bold'">
                                </span>
                            </td>
                            <td>
                                <input type="hidden" name="idMateriales"
                                       th:value="${material.idMaterial}"/>
                                <input type="number"
                                       name="cantidades"
                                       value="0"
                                       min="0"
                                       th:max="${material.stock}"
                                       class="form-control form-control-sm"
                                       style="width: 80px;"
                                       th:disabled="${material.stock == 0}"/>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a href="/catalogo/materiales" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Enviar Cotización</button>
        </div>

    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
