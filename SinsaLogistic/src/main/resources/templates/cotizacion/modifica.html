<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
<nav th:replace="~{general/fragmentos :: menu}"></nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-pencil-square me-2"></i>Cotización
                </div>
                <div class="card-body">
                    <form th:action="@{/cotizacion/guardar}" method="post" th:object="${cotizacion}">
                        <input type="hidden" th:field="*{idCotizacion}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Fecha</label>
                            <input type="date" th:field="*{fecha}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Estado</label>
                            <select th:field="*{estado}" class="form-select">
                                <option value="PENDIENTE">Pendiente</option>
                                <option value="APROBADA">Aprobada</option>
                                <option value="RECHAZADA">Rechazada</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Total</label>
                            <input type="number" th:field="*{total}" class="form-control" placeholder="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cliente</label>
                            <select th:field="*{cliente.idCliente}" class="form-select">
                                <option value="">Seleccione un cliente</option>
                                <option th:each="cl : ${clientes}"
                                        th:value="${cl.idCliente}"
                                        th:text="${cl.nombre}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Teléfono</label>
                            <input type="tel" th:field="*{telefono}" class="form-control"
                                   placeholder="Ej: 8888-8888">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Dirección de entrega</label>
                            <input type="text" th:field="*{direccionEntrega}" class="form-control"
                                   placeholder="Ej: San José, Av. Central">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/cotizacion/listado}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
