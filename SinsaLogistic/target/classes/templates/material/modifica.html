<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
<nav th:replace="~{general/fragmentos :: menu}"></nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-pencil-square me-2"></i>Editar Material
                </div>
                <div class="card-body">
                    <form th:action="@{/material/guardar}" method="post" th:object="${material}">
                        <input type="hidden" th:field="*{idMaterial}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Precio</label>
                            <input type="number" th:field="*{precio}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Stock</label>
                            <input type="number" th:field="*{stock}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/material/listado}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
